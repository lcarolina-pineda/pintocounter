<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempo sin mencionar a Pinto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin-bottom: 1.5rem; font-weight: 300; }
        .counter {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        .time-segment { display: flex; flex-direction: column; }
        .label { font-size: 0.8rem; text-transform: uppercase; color: #aaa; margin-top: 5px; }
        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            background: #ff4b2b;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #ff416c; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <h1>Tiempo sin mencionar a Pinto</h1>
    <div class="counter">
        <div class="time-segment"><span id="days">00</span><span class="label">Días</span></div>
        <div class="time-segment"><span id="hours">00</span><span class="label">Horas</span></div>
        <div class="time-segment"><span id="minutes">00</span><span class="label">Minutos</span></div>
        <div class="time-segment"><span id="seconds">00</span><span class="label">Segundos</span></div>
    </div>
    <button id="btnReset" onclick="resetCounter()">Pinto fue mencionado</button>
</div>

<script>
    // IMPORTANTE: Cambia "mi-contador-pinto-2026" por cualquier palabra única para tu grupo
    const NAMESPACE = "contador-pinto-global"; 
    const KEY = "ultima_mencion";
    
    let startTime = Date.now();

    // Función para obtener la hora de inicio desde la API
    async function syncTime() {
        try {
            const response = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${KEY}`);
            const data = await response.json();
            // Multiplicamos por 1000 porque guardaremos segundos en la API
            startTime = data.value * 1000;
        } catch (e) {
            // Si la llave no existe, la creamos con el tiempo actual
            resetCounter();
        }
    }

    async function resetCounter() {
        const nowInSeconds = Math.floor(Date.now() / 1000);
        try {
            // Guardamos el momento exacto actual en la nube
            await fetch(`https://api.countapi.xyz/set/${NAMESPACE}/${KEY}?value=${nowInSeconds}`);
            startTime = Date.now();
            alert("¡Contador reiniciado para todos!");
        } catch (e) {
            console.error("Error al sincronizar");
        }
    }

    function updateDisplay() {
        const diff = Date.now() - startTime;
        const displayDiff = diff > 0 ? diff : 0;

        const d = Math.floor(displayDiff / (1000 * 60 * 60 * 24));
        const h = Math.floor((displayDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((displayDiff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((displayDiff % (1000 * 60)) / 1000);

        document.getElementById('days').innerText = d.toString().padStart(2, '0');
        document.getElementById('hours').innerText = h.toString().padStart(2, '0');
        document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
    }

    // Sincronizar al cargar y luego cada 30 segundos por si alguien más reinició
    syncTime();
    setInterval(syncTime, 30000); 
    setInterval(updateDisplay, 1000);
</script>

</body>
</html>
